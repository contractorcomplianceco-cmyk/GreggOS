  </head>
  <body>
    <style>
      #gregg-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1.25rem;
        background:
          radial-gradient(90% 70% at 50% 0%, rgba(239,106,31,0.22), transparent 60%),
          linear-gradient(180deg, #14100a 0%, #0a0703 100%);
        transition: opacity .5s ease;
      }
      #gregg-splash img {
        width: 168px; height: 168px; border-radius: 9999px;
        box-shadow: 0 12px 44px -8px rgba(0,0,0,.6), 0 0 0 4px rgba(230,194,90,.55);
        animation: gregg-spin 9s linear infinite;
      }
      #gregg-splash .tag {
        font-family: 'Cabinet Grotesk','General Sans',system-ui,sans-serif;
        text-transform: uppercase; letter-spacing: .22em; font-size: 11px; font-weight: 700;
        color: #e6c25a;
      }
      #gregg-splash .bar {
        width: 148px; height: 3px; border-radius: 999px; overflow: hidden;
        background: rgba(230,194,90,.18);
      }
      #gregg-splash .bar::after {
        content: ""; display: block; height: 100%; width: 40%; border-radius: 999px;
        background: linear-gradient(90deg, #b7871f, #e6c25a, #f5e2a0);
        animation: gregg-load 1.1s ease-in-out infinite;
      }
      @keyframes gregg-spin { to { transform: rotate(360deg); } }
      @keyframes gregg-load {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #gregg-splash img { animation: none; }
        #gregg-splash .bar::after { animation: none; width: 100%; }
      }
    </style>
    <div id="root"></div>
    <!-- Branded first-paint splash lives outside #root so React never wipes it early -->
    <div id="gregg-splash">
      <img src="/gregg-badge.png" alt="GREGG — Fishing, Boats & Hoes" />
      <div class="tag">Boats · Business · Tight Lines</div>
      <div class="bar"></div>
    </div>
    <script>
      // Fade + remove the splash once React has mounted content into #root.
      (function () {
        var root = document.getElementById('root');
        function clearSplash() {
          var splash = document.getElementById('gregg-splash');
          if (!splash) return;
          splash.style.opacity = '0';
          setTimeout(function () { splash.remove(); }, 550);
        }
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) { clearSplash(); obs.disconnect(); }
        });
        obs.observe(root, { childList: true });
        if (root.children.length > 0) { clearSplash(); obs.disconnect(); }
        // Safety fallback: always clear after 8s
        setTimeout(clearSplash, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
