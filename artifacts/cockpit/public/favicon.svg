<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GREGG OS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1206"/>
      <stop offset="1" stop-color="#070502"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="30" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7e6a6"/>
      <stop offset="0.5" stop-color="#e6c25a"/>
      <stop offset="1" stop-color="#a9781a"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- sunset glow -->
  <circle cx="132" cy="52" r="46" fill="#ef6a1f" opacity="0.28"/>
  <!-- crown -->
  <path d="M58 44 L72 58 L90 32 L108 58 L122 44 L118 74 H62 Z"
