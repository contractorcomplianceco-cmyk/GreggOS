<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GreggOS">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15788A"/>
      <stop offset="1" stop-color="#0B3A47"/>
    </linearGradient>
    <linearGradient id="body" x1="36" y1="60" x2="150" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3FE0E0"/>
      <stop offset="1" stop-color="#15A3B0"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#sea)"/>
  <!-- stylized mahi-mahi silhouette -->
  <!-- tall blunt forehead, long sloping dorsal, deeply forked tail -->
  <path d="M150 96
           c-10 9 -24 15 -40 17
           c2 7 1 14 -3 20
           c-7 -3 -13 -8 -17 -15
           c-18 -1 -34 -8 -45 -20
           c-6 5 -14 7 -22 7
           c4 -7 6 -14 6 -21
           c0 -7 -2 -14 -6 -21
           c8 0 16 2 22 7
           c8 -9 19 -16 32 -19
           c1 -9 5 -17 12 -23
           c5 7 7 15 6 23
           c20 3 36 14 45 28
           c4 6 8 7 13 8 z" fill="url(#body)"/>
  <!-- coral lateral line -->
  <path d="M52 90 C78 82 110 82 134 92" stroke="#F4623A" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- dorsal accent -->
  <path d="M70 70 C90 60 116 62 134 74" stroke="#0B3A47" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- eye -->
  <circle cx="120" cy="90" r="6" fill="#06212A"/>
  <circle cx="122" cy="88" r="2" fill="#fff" opacity="0.85"/>
</svg>
