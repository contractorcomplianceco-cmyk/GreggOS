  <!-- shield -->
  <path d="M50 80 H130 V112 C130 132 111 145 90 152 C69 145 50 132 50 112 Z"
        fill="url(#gold)" stroke="#7c560f" stroke-width="3" stroke-linejoin="round"/>
  <!-- G -->
  <text x="90" y="128" text-anchor="middle"
        font-family="'Cabinet Grotesk', Inter, system-ui, sans-serif"
        font-size="54" font-weight="800" fill="#1a1206">G</text>
</svg>
