kind = "video"
previewPath = "/cockpit-walkthrough/"
title = "Cockpit Walkthrough"
version = "1.0.0"
id = "artifacts/cockpit-walkthrough"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cockpit-walkthrough/" ]
localPort = 26028

[services.development]
run = "pnpm --filter @workspace/cockpit-walkthrough run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cockpit-walkthrough", "run", "build" ]
publicDir = "artifacts/cockpit-walkthrough/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26028"
BASE_PATH = "/cockpit-walkthrough/"
