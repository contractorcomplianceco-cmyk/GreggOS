components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MutationResult:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
      required: [ok]

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        displayName: { type: string }
        role: { type: string }
        active: { type: boolean }
      required: [id, email, displayName, role, active]

    UserUpdate:
      type: object
      properties:
        role: { type: string, enum: [admin, coordinator] }
        active: { type: boolean }

    RiskFactor:
      type: object
      properties:
        label: { type: string }
        score: { type: number }
        weight: { type: number }
        trend: { type: string }
      required: [label, score, weight, trend]

    AuditScoreItem:
      type: object
      properties:
        category: { type: string }
        score: { type: number }
        weight: { type: number }
        notes: { type: string }
      required: [category, score, weight, notes]

    Client:
      type: object
      properties:
        id: { type: string }
        clientName: { type: string }
        companyName: { type: string }
        contactName: { type: string }
        phone: { type: string }
        email: { type: string }
        clientStatus: { type: string }
        greggPriority: { type: string }
        riskLevel: { type: string }
        lastMeaningfulContact: { type: string }
        nextAction: { type: string }
        nextOwner: { type: string }
        nextOwnerUserId:
          type: [string, "null"]
        coOwner: { type: string }
        coOwnerUserId:
          type: [string, "null"]
        involvementState: { type: string }
        touchCadenceDays: { type: integer }
        dueDate: { type: string }
        missingInformation: { type: string }
        openTasks: { type: integer }
        opportunitySignals: { type: integer }
        escalations: { type: integer }
        callNotes: { type: integer }
      required:
        - id
        - clientName
        - companyName
        - contactName
        - phone
        - email
        - clientStatus
        - greggPriority
        - riskLevel
        - lastMeaningfulContact
        - nextAction
        - nextOwner
        - coOwner
        - involvementState
        - touchCadenceDays
        - dueDate
        - missingInformation
        - openTasks
        - opportunitySignals
        - escalations
        - callNotes

    ClientInput:
      type: object
