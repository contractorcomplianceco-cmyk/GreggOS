openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gregg + Landon Current Client Cockpit API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: clients
  - name: call-notes
  - name: tasks
  - name: signals
  - name: escalations
  - name: audit-links
  - name: activity
  - name: view-state
  - name: admin
  - name: communications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients with derived counters
      parameters:
        - name: search
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: owner
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{clientId}:
    parameters:
      - name: clientId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getClientDetail
      tags: [clients]
      summary: Aggregate client detail
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{clientId}/audit-link:
    parameters:
      - name: clientId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getAuditLink
      tags: [audit-links]
      summary: Get the audit link for a client
      responses:
        "200":
          description: Audit link or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLinkOrNull"
    put:
      operationId: setAuditLink
      tags: [audit-links]
      summary: Confirm an audit link for a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditLinkInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLink"
    delete:
      operationId: unsetAuditLink
      tags: [audit-links]
      summary: Remove the audit link for a client
      responses:
        "204":
          description: Removed

  /call-notes:
    get:
      operationId: listCallNotes
      tags: [call-notes]
      summary: List call notes
      parameters:
        - name: clientId
          in: query
          required: false
          schema: { type: string }
        - name: routingStatus
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Call notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallNote"
    post:
      operationId: createCallNote
      tags: [call-notes]
      summary: Create a call note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallNote"

  /call-notes/process:
    post:
      operationId: processCallNote
      tags: [call-notes]
      summary: Transactionally save a processed call note and regenerate children
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessNoteInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessNoteResult"

  /call-notes/{noteId}:
    parameters:
      - name: noteId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getCallNote
      tags: [call-notes]
      summary: Get a call note
      responses:
        "200":
          description: Call note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallNote"
    patch:
      operationId: updateCallNote
      tags: [call-notes]
      summary: Update a call note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallNote"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: clientId
          in: query
          required: false
          schema: { type: string }
        - name: owner
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    parameters:
      - name: taskId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /opportunity-signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List opportunity signals
      parameters:
        - name: clientId
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpportunitySignal"

  /opportunity-signals/{signalId}:
    parameters:
      - name: signalId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateSignal
      tags: [signals]
      summary: Update an opportunity signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunitySignal"

  /escalations:
    get:
      operationId: listEscalations
      tags: [escalations]
      summary: List escalations
      parameters:
        - name: clientId
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Escalations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Escalation"

  /escalations/{escalationId}:
    parameters:
      - name: escalationId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateEscalation
      tags: [escalations]
      summary: Update an escalation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EscalationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Escalation"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity log entries
      parameters:
        - name: clientId
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogEntry"

  /view-state/{scope}:
    parameters:
      - name: scope
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getViewState
      tags: [view-state]
      summary: Get last-seen view state for a scope
      responses:
        "200":
          description: View state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewState"

  /view-state/{scope}/seen:
    parameters:
      - name: scope
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: markSeen
      tags: [view-state]
      summary: Mark a scope as seen now
      responses:
        "200":
          description: View state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewState"

  /admin/export:
    get:
      operationId: exportData
      tags: [admin]
      summary: Export the full dataset (admin only)
      responses:
        "200":
          description: Full dump
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportData"

  /admin/reset:
    post:
      operationId: resetToSeed
      tags: [admin]
      summary: Reset the dataset to seed (admin only)
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutationResult"

  /admin/import:
    post:
      operationId: importData
      tags: [admin]
      summary: Import a full dataset (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportData"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutationResult"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{userId}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user's role or active status (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /relationships:
    get:
      operationId: listRelationships
      tags: [relationships]
      summary: List portfolio relationship summaries (warmth / cadence radar)
      parameters:
        - name: owner
          in: query
          required: false
          schema: { type: string }
        - name: warmth
          in: query
          required: false
          schema: { type: string }
        - name: sharedWithTara
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Relationship summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RelationshipSummary"

  /expansion-pipeline:
    get:
      operationId: listExpansionPipeline
      tags: [expansion]
      summary: List portfolio-wide expansion opportunities, scored and sorted
      parameters:
        - name: owner
          in: query
          required: false
          schema: { type: string }
        - name: stage
          in: query
          required: false
          schema: { type: string }
        - name: sharedWithTara
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Expansion opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpansionOpportunity"

  /expansion-milestones:
    post:
      operationId: createExpansionMilestone
      tags: [expansion]
      summary: Create an expansion milestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpansionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpansionMilestone"

  /expansion-milestones/{milestoneId}:
    parameters:
      - name: milestoneId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateExpansionMilestone
      tags: [expansion]
      summary: Update an expansion milestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpansionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpansionMilestone"

  /scheduled-events:
    get:
      operationId: listScheduledEvents
      tags: [events]
      summary: List scheduled events
      parameters:
        - name: clientId
          in: query
          required: false
          schema: { type: string }
        - name: owner
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Scheduled events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledEvent"
    post:
      operationId: createScheduledEvent
      tags: [events]
      summary: Create a scheduled event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledEvent"

  /scheduled-events/{eventId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateScheduledEvent
      tags: [events]
      summary: Update a scheduled event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledEvent"

  /contact-log:
    post:
      operationId: createContactLogEntry
      tags: [contact-log]
      summary: Log a relationship touch (call, email, visit, meal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactLogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactLogEntry"

  /clients/{clientId}/handoff:
    parameters:
      - name: clientId
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: handoffClient
      tags: [clients]
      summary: Hand off a client to another owner and set involvement state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandoffInput"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /crm-links:
    get:
      operationId: listCrmLinks
      tags: [crm]
      summary: List CRM links (the export/approve/push queue)
      parameters:
        - { name: entityType, in: query, required: false, schema: { type: string } }
        - { name: clientId, in: query, required: false, schema: { type: string } }
        - { name: syncStatus, in: query, required: false, schema: { type: string } }
        - { name: crmModule, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: CRM links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmLink"
    post:
      operationId: upsertCrmLink
      tags: [crm]
      summary: Approve an entity for CRM (idempotent on entityType+entityId)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLinkInput"
      responses:
        "200":
          description: Approved or updated CRM link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLink"

  /crm-links/{linkId}:
    parameters:
      - name: linkId
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateCrmLink
      tags: [crm]
      summary: Mark pushed to CRM (capture record id) or record a sync failure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLinkUpdate"
      responses:
        "200":
          description: Updated CRM link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLink"

  /crm-export:
    get:
      operationId: listCrmExport
      tags: [crm]
      summary: CRM-ready export payloads (export-only; no live push)
      parameters:
        - { name: entityType, in: query, required: false, schema: { type: string } }
        - { name: entityId, in: query, required: false, schema: { type: string } }
        - { name: syncStatus, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: CRM-ready payloads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmExportPayload"

  /communication-drafts:
    get:
      operationId: listCommunicationDrafts
      tags: [communications]
      summary: List saved communication drafts
      parameters:
        - { name: clientId, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Communication drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunicationDraft"

  /communication-drafts/generate:
    post:
      operationId: generateCommunicationDraft
      tags: [communications]
      summary: Generate a client communication draft (AI with template fallback). Draft-only; nothing is sent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunicationDraftGenerateInput"
      responses:
        "201":
          description: Generated and saved draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunicationDraft"

  /communication-drafts/{draftId}:
    parameters:
      - name: draftId
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getCommunicationDraft
      tags: [communications]
      summary: Get a communication draft
      responses:
        "200":
          description: Communication draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunicationDraft"
    patch:
      operationId: updateCommunicationDraft
      tags: [communications]
      summary: Edit a communication draft (subject/body/status)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunicationDraftUpdate"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunicationDraft"
    delete:
      operationId: deleteCommunicationDraft
      tags: [communications]
      summary: Delete a communication draft
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutationResult"

  /reports/relationships:
    get:
      operationId: getRelationshipReport
      tags: [reports]
      summary: Relationship activity report (operational + leadership)
      parameters:
        - { name: windowDays, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Relationship report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipReport"

  /reports/expansion:
    get:
      operationId: getExpansionReport
      tags: [reports]
      summary: Expansion pipeline + revenue report with owner attribution
      responses:
        "200":
          description: Expansion report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpansionReport"

  /reports/activity:
    get:
      operationId: getActivityReport
      tags: [reports]
      summary: Follow-up + activity report
      parameters:
        - { name: windowDays, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Activity report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityReport"

  /travel-plans:
    get:
      operationId: listTravelPlans
      tags: [travel]
      summary: List travel / client-visit plans
      parameters:
        - { name: clientId, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Travel plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TravelPlan"
    post:
      operationId: createTravelPlan
      tags: [travel]
      summary: Create a travel plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelPlanInput"
      responses:
        "201":
          description: Created travel plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelPlan"
  /travel-plans/{planId}:
    parameters:
      - { name: planId, in: path, required: true, schema: { type: string } }
    patch:
      operationId: updateTravelPlan
      tags: [travel]
      summary: Update a travel plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelPlanUpdate"
      responses:
        "200":
          description: Updated travel plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelPlan"
    delete:
      operationId: deleteTravelPlan
      tags: [travel]
      summary: Delete a travel plan
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutationResult"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List executive activity expenses
      parameters:
        - { name: clientId, in: query, required: false, schema: { type: string } }
        - { name: category, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Expenses
          content:
            application/json:
              schema:
                type: array
                items:
